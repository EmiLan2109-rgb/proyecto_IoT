services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./database/pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./phase2_partial/docker_files/broker/config:/mosquitto/config
      - ./phase2_partial/docker_files/broker/data:/mosquitto/data
      - ./phase2_partial/docker_files/broker/certs:/mosquitto/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t healthcheck -m ping -u ${MQTT_USER} -P ${MQTT_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  client:
    build: ./phase2_partial/docker_files/client
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 8883
      MQTT_TLS: "true"
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC: ${MQTT_TOPIC}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_HOST: api
      API_PORT: 8000
      API_URL: http://api:8000
      DEVICE_NAME: node-01
      DEVICE_TYPE: sensor
    volumes:
      - ./phase2_partial/docker_files/broker/certs/ca.crt:/app/ca.crt:ro
      - ./phase2_partial/docker_files/client/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      api:
        condition: service_started

  dashboard:
    build: ./phase2_partial/source_code/dashboard
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy

  api:
      build: ./phase2_partial/source_code/api
      restart: unless-stopped
      environment:
        POSTGRES_HOST: postgres
        POSTGRES_PORT: 5432
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ports:
        - "8000:8000"
      depends_on:
        postgres:
          condition: service_healthy

  sensor-sim:
      build: ./phase2_partial/source_code/sensor-sim
      restart: unless-stopped
      environment:
        MQTT_HOST: mosquitto
        MQTT_PORT: 8883
        MQTT_TLS: "true"
        MQTT_USER: ${MQTT_USER}
        MQTT_PASSWORD: ${MQTT_PASSWORD}
        MQTT_TOPIC: ${MQTT_TOPIC}
      volumes:
        - ./phase2_partial/docker_files/broker/certs/ca.crt:/app/ca.crt:ro
      depends_on:
        mosquitto:
          condition: service_healthy
